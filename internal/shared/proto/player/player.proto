syntax = "proto3";

package three_kingdoms.player;

import "common/common.proto";
import "player/role.proto";
import "player/resource.proto";
import "player/building.proto";
import "player/arm.proto";
import "player/general.proto";
import "player/city.proto";
import "player/pos_tag.proto";
import "player/war_report.proto";
import "player/skill.proto";

option go_package = "ThreeKingdoms/internal/shared/gen/player;playerpb";


message PlayerRequest {
  int64 player_id = 1;
  int64 world_id = 2;
  int64 seq = 3;

  oneof body {
    EnterServerRequest enterServerRequest = 10;
    CreateRoleRequest createRoleRequest = 11;
    BuildingConfRequest buildingConfRequest = 12;
    MyPropertyRequest myPropertyRequest = 13;
    PosTagListRequest posTagListRequest = 14;
    MyGeneralsRequest myGeneralsRequest = 15;
    ArmyListRequest armyListRequest = 16;
    WarReportRequest WarReportRequest = 17;
    SkillListRequest skillListRequest = 18;
    ScanBlockRequest scanBlockRequest = 19;
    OpenCollectionRequest openCollectionRequest = 20;
    CollectionRequest collectionRequest = 21;
  }

  string trace_id = 100;
}

message PlayerResponse {
  common.BizResult result = 1;

  oneof body {
    EnterServerResponse enterServerResponse = 10;
    CreateRoleResponse createRoleResponse = 11;
    BuildingConfResponse buildingConfResponse = 12;
    MyPropertyResponse myPropertyResponse = 13;
    PosTagListResponse posTagListResponse = 14;
    MyGeneralsResponse myGeneralsResponse = 15;
    ArmyListResponse armyListResponse = 16;
    WarReportResponse WarReportResponse = 17;
    SkillListResponse skillListResponse = 18;
    ScanBlockResponse scanBlockResponse = 19;
    OpenCollectionResponse openCollectionResponse = 20;
    CollectionResponse collectionResponse = 21;
  }
}

service PlayerService {
  rpc Handle(PlayerRequest) returns (PlayerResponse);
}

message EnterServerRequest {
  int32 player_id = 1;
}

message EnterServerResponse {
  Role role = 1;
  Resource resource = 2;
  int64 time = 3;
  string token = 4;
}

message CreateRoleRequest {
  int64 player_id = 1;
  string nick_name = 2;
  int32 sex = 3;
  int32 sid = 4;
  int32 head_id = 5;
}

message CreateRoleResponse {
  Role role = 1;
}

message BuildingConfRequest {
  int64 player_id = 1;
}

message BuildingConfResponse {
  repeated BuildingCfg cfgs = 1;
}

message MyPropertyRequest {
  int32 player_id = 1;
}

message MyPropertyResponse {
  Resource resource = 1;
  repeated Building buildings = 2;
  repeated General generals = 3;
  repeated City cities = 4;
  repeated Army armies = 5;
}

message PosTagListRequest {
  int32 player_id = 1;
}

message PosTagListResponse {
  repeated PosTag posTags = 1;
}

message MyGeneralsRequest {
}

message MyGeneralsResponse {
  repeated General generals = 1;
}

message ArmyListRequest {
  int32 CityId = 1;
}

message ArmyListResponse {
  int32 CityId = 1;
  repeated Army armies = 2;
}

message WarReportRequest {
}

message WarReportResponse {
  repeated WarReport warReports = 1;
}

message SkillListRequest {
}

message SkillListResponse {
  repeated Skill skills = 1;
}

message ScanBlockRequest {
  int32 x = 1;
  int32 y = 2;
  int32 Length = 3;
}

message ScanBlockResponse {
  repeated Building buildings = 1;
  repeated City cities = 2;
  repeated Army Armies = 3;
}

message OpenCollectionRequest {

}

message OpenCollectionResponse {
  int32 limit = 1;
  int32 curTimes = 2;
  int64 nextTime = 3;
}

message CollectionRequest {
}

message CollectionResponse {
  int32 gold = 1;
  int32 limit = 2;
  int32 curTimes = 3;
  int64 nextTime = 4;
}